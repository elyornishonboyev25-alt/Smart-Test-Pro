<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="brand-bg" x1="14" y1="10" x2="106" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="58%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <linearGradient id="brand-shine" x1="14" y1="12" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.92)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.14)" />
    </linearGradient>
    <linearGradient id="brand-accent" x1="64" y1="60" x2="82" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="brand-spark" x1="84" y1="6" x2="105" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#BFDBFE" />
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="5" y="5" width="110" height="110" rx="30" fill="url(#brand-bg)" />
  <rect x="6.2" y="6.2" width="107.6" height="107.6" rx="28.8" stroke="url(#brand-shine)" stroke-opacity="0.72" />

  <!-- Globe (study abroad) -->
  <circle cx="60" cy="75" r="23.6" fill="white" fill-opacity="0.16" stroke="white" stroke-width="4.4" />
  <ellipse cx="60" cy="75" rx="23.6" ry="8.8" fill="none" stroke="white" stroke-width="3.1" stroke-opacity="0.9" />
  <ellipse cx="60" cy="75" rx="8.8" ry="23.6" fill="none" stroke="white" stroke-width="3.1" stroke-opacity="0.9" />
  <!-- Destination marker abroad -->
  <circle cx="69.4" cy="66.9" r="4.5" fill="url(#brand-accent)" stroke="white" stroke-width="1.9" />

  <!-- Graduation cap (education) -->
  <path d="M60 20.1 90 33 60 45.9 30 33Z" fill="white" />
  <circle cx="60" cy="33" r="3.1" fill="url(#brand-accent)" />
  <path d="M90 33c3.6 1.9 4.5 6.4 3.2 11.4" stroke="white" stroke-width="3" stroke-linecap="round" />
  <circle cx="93.2" cy="47.1" r="3.6" fill="url(#brand-accent)" />

  <!-- AI sparks -->
  <path d="M94.3 7.3 97.3 14.1 104.1 17.1 97.3 20.1 94.3 27 91.3 20.1 84.4 17.1 91.3 14.1Z" fill="url(#brand-spark)" />
  <path d="M105.9 26.6 107.1 30 110.6 31.3 107.1 32.6 105.9 36 104.6 32.6 101.1 31.3 104.6 30Z" fill="url(#brand-spark)" fill-opacity="0.9" />
</svg>
