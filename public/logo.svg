    <path d="M18.6 19.1c1.4-1 3.1-1.1 4.2-.3.9.7.5 1.7-.3 2.3-.7.5-.4 1.3.3 1.6.9.4.6 1.4-.5 1.7-1.7.5-3.6-.2-4.4-1.4-.8-1.2-.4-2.9.7-3.5Z" />
