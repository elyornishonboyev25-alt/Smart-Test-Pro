<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="pa-cap" x1="10" y1="9" x2="54" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5A4D" />
      <stop offset="52%" stop-color="#F23B2E" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="pa-base" x1="18" y1="29" x2="46" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F23B2E" />
      <stop offset="100%" stop-color="#C81E1E" />
    </linearGradient>
    <linearGradient id="pa-tassel" x1="46" y1="22" x2="56" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B5E" />
      <stop offset="100%" stop-color="#E11D2B" />
    </linearGradient>
    <clipPath id="pa-clip">
      <path d="M32 8.4 59.4 21.4 32 34.4 4.6 21.4Z" />
    </clipPath>
  </defs>

  <!-- Cap base (the headband that rests on the head) -->
  <path d="M16.6 26.8 32 34.1 47.4 26.8 47.4 38.4C47.4 43.1 40.5 46.4 32 46.4 23.5 46.4 16.6 43.1 16.6 38.4Z" fill="url(#pa-base)" />
  <path d="M16.6 26.8 32 34.1 47.4 26.8" stroke="white" stroke-opacity="0.28" stroke-width="1.1" fill="none" />

  <!-- Mortarboard (top-down, in perspective) -->
  <path d="M32 8.4 59.4 21.4 32 34.4 4.6 21.4Z" fill="url(#pa-cap)" />
  <path d="M32 8.4 59.4 21.4 32 34.4 4.6 21.4Z" stroke="white" stroke-opacity="0.55" stroke-width="0.9" />

